- name: Vuforia Engine Web API
  description: The Vuforia Engine Web API provides HTTPS REST access to cloud-based
    augmented reality capabilities including Cloud Image Recognition, Cloud Area Targets,
    and license management for building AR applications across mobile and wearable
    devices.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.ptc.com/en/products/vuforia
  baseURL: https://cloudreco.vuforia.com
  tags:
