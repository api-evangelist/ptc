aid: ptc
name: PTC
description: PTC is an industrial technology company providing software platforms
  and APIs for Industrial IoT (ThingWorx), Product Lifecycle Management (Windchill,
  Arena), Augmented Reality (Vuforia), Field Service Management (ServiceMax), and
  industrial connectivity (Kepware) in manufacturing environments.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/ptc/refs/heads/main/apis.yml
created: '2026-06-13'
modified: '2026-06-13'
specificationVersion: '0.19'
tags:
