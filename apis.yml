- name: Arena PLM REST API
  description: Arena PLM REST API v1 provides full programmatic access to Arena's
    cloud-based PLM capabilities including Bill of Materials management, change management,
    quality, and compliance. Full OpenAPI/Swagger documentation available per region
    with interactive testing.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.ptc.com/en/products/arena
  baseURL: https://api.arenasolutions.com/v1
  tags:
  - PLM
  - Product Lifecycle Management
  - BOM
  - Change Management
  - SaaS
  properties:
  - type: Documentation
    url: https://ptc-arena.github.io/arena-dev-help/
