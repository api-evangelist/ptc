- name: Kepware Configuration REST API
  description: The Kepware KEPServerEX Configuration API is a local REST API that
    enables programmatic configuration of the industrial connectivity server including
    channels, devices, tags, and IoT Gateway agents. Accepts and returns JSON-formatted
    data.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.ptc.com/en/products/kepware
  baseURL: https://localhost:57412/config/v1
  tags:
  - Industrial Connectivity
  - OPC-UA
  - SCADA
  - IIoT
  - Manufacturing
  - Configuration
