apis:
- name: ThingWorx REST API
  description: The ThingWorx Industrial IoT platform REST API enables developers to
    interact with Things, Properties, Services, Events, and Subscriptions via HTTP.
    Authentication uses an AppKey passed as an HTTP header. Supports building, connecting,
    and deploying IIoT applications.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.ptc.com/en/products/thingworx
  baseURL: https://{your-thingworx-host}/Thingworx
  tags:
  - Industrial IoT
  - IIoT
  - REST
  - Manufacturing
  properties:
  - type: Documentation
    url: https://support.ptc.com/help/thingworx/platform/r9/en/ThingWorx/api_documentation.html
  - type: GettingStarted
    url: https://community.ptc.com/t5/IoT-Tips/Use-REST-API-to-Access-ThingWorx-Part-1/ta-p/825305
  - type: Community
