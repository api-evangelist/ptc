- name: ServiceMax Max REST API
  description: ServiceMax REST API (Max REST API) enables integration with ServiceMax
    field service management capabilities including work orders, scheduling, service
    boards, and field metadata management. Built on the Salesforce platform.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.ptc.com/en/products/servicemax
  baseURL: https://{instance}.salesforce.com/services/apexrest/SVMXC
  tags:
  - Field Service Management
  - FSM
